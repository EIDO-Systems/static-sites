<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIDO Healthcare Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            color: #0d2240;
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            min-height: 100vh;
        }
        .content {
            grid-column: 2 / 4;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .content h1 {
            font-size: 1.4em;
            font-weight: bold;
            margin: 60px 0 0 0;
            text-align: center;
            align-self: center;
        }
        .content p {
            text-align: center;
            margin: 20px 0 0 0;
            align-self: center;
        }
        .logo {
            margin-top: 150px;
            width: 150px;
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="https://www.eidohealthcare.com/app/uploads/2022/05/EIDO_Logo_Trusted_Digital_Consent_CMYK.png" alt="EIDO Healthcare Logo" class="logo">
        <h1>Digital Consent is no longer available in your region.</h1>
        <p>For more information about other EIDO Healthcare products and services, please visit: <a href="https://www.eidohealthcare.com">www.eidohealthcare.com</a></p>
    </div>
</body>
</html>
